{% extends 'base.html' %}
{% load static %}
{% block content %}
    <br>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <h4>Grafana</h4>
                <p>Si no carga, verifica que Grafana esté encendido y que <code>GRAFANA_URL</code> apunte al host correcto.</p>
                <div style="width: 100%; height: 75vh; border: 1px solid #ddd;">
                    <iframe
                        src="{{ grafana_url }}"
                        style="width: 100%; height: 100%; border: 0;"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
